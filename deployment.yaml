apiVersion: apps/v1
kind: Deployment

metadata:
  name: employee-backend
  namespace: default

spec:
  replicas: 2

  selector:
    matchLabels:
      app: employee-backend

  template:
    metadata:
      labels:
        app: employee-backend

    spec:
      containers:
      - name: employee-backend
        image: 621533607727.dkr.ecr.us-east-1.amazonaws.com/employee:v1
        imagePullPolicy: Always

        ports:
        - containerPort: 3000